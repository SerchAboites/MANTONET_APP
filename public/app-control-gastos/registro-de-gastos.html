      <fieldset>
        <legend>Información de la Operación</legend>
        
        <label>Fecha Operación:</label>
        <input type="date" name="fechaOperacion">

        <label for="opcionSelect">Empresa:</label>
        <select id="opcionSelect" name="empresa" required>
          <option value="" disabled selected>***</option>
          <option value="ALSE">ALSE</option>
          <option value="MANTONET">MANTONET</option>
        </select>

        <label for="proyecto">Proyecto</label>
        <select id="proyecto" name="proyecto" required onchange="this.value = this.value.toUpperCase()">
          <option value="" disabled selected>***</option>
        </select>

        <label for="categoria">Categoría:</label>
        <select name="categoria" id="categoria" required>
          <option value="" disabled selected>***</option>
          <option value="ADMINISTRACIÓN">ADMINISTRACIÓN</option>
          <option value="MATERIAL">MATERIAL</option>
          <option value="HERRAMIENTA">HERRAMIENTA</option>
          <option value="EQUIPO DE SEGURIDAD">EQUIPO DE SEGURIDAD</option>
          <option value="TRANSPORTE">TRANSPORTE</option>
          <option value="ALIMENTOS">ALIMENTOS</option>
          <option value="INGRESO">INGRESO</option>
          <option value="MANO DE OBRA">MANO DE OBRA</option>
          <option value="DIVIDENDOS">DIVIDENDOS</option>
          <option value="PROPINA">PROPINA</option>
        </select>

        <label>Concepto:</label>
        <input type="text" name="concepto" id="concepto" oninput="this.value=this.value.toUpperCase()" required placeholder="***">

        <label>Tipo:</label>
        <select name="tipo" required>
          <option value="" disabled selected>***</option>
          <option value="GASTO">GASTO</option>
          <option value="INGRESO">INGRESO</option>
        </select>

        <label>Inversor:</label>
        <select name="inversor" required>
          <option value="" disabled selected>***</option>
          <option value="SERGIO">SERGIO</option>
          <option value="ALEJANDRA">ALEJANDRA</option>
          <option value="AMBOS">AMBOS</option>
          <option value="PRESUPUESTO DE PROYECTO">PRESUPUESTO DE PROYECTO</option>
        </select>

        <label>Estatus:</label>
        <select name="estatus" required>
          <option value="" disabled selected>***</option>
          <option value="FACTURAR PENDIENTE">FACTURAR PENDIENTE</option>
          <option value="FACTURADO">FACTURADO</option>
          <option value="NO FACTURABLE">NO FACTURABLE</option>
          <option value="NO PAGADO">NO PAGADO</option>
          <option value="PAGADO">PAGADO</option>
        </select>

        <label>Monto Operación:</label>
        <input type="text" name="monto" id="montoOperacion" inputmode="decimal" oninput="formatearMonto(this)" placeholder="$0.00" required>
      </fieldset>

      <fieldset style="display:none;">
        <legend>Datos Ocultos</legend>
        <label>Mes:</label> <input type="text" name="mes">
        <label>Año:</label> <input type="number" name="year">
        <label>Check:</label> <input type="checkbox" name="check">
        <label>$ IVA:</label> <input type="number" name="iva" step="0.01">
        <label>$ ISR:</label> <input type="number" name="isr" step="0.01">
        <label>$ ISR Retenido:</label> <input type="number" name="isrRetenido" step="0.01">
        <label>$ IVA Retenido:</label> <input type="number" name="ivaRetenido" step="0.01">
        <label>$ Neto:</label> <input type="number" name="neto" step="0.01">
        <label>Fecha Factura:</label> <input type="date" name="fechaFactura">
        <label>Mes Factura:</label> <input type="text" name="mesFactura">
        <label>Link Carpeta:</label> <input type="url" name="linkCarpeta">
        <label>Link Ticket:</label> <input type="url" name="linkTicket">
        <label>Factura:</label> <input type="text" name="factura">
        <label>Link Factura:</label> <input type="url" name="linkFactura">
        <label>XML:</label> <input type="text" name="xml">
        <label>Link XML:</label> <input type="url" name="linkXml">
      </fieldset>

      <fieldset>
        <legend>Ticket y Facturación</legend>
        <label>¿Requiere subir Ticket?</label>
        <select name="ticket" id="ticket" required>
          <option value="" disabled selected>***</option>
          <option value="NO">NO</option>
          <option value="SI">SI</option>
        </select>
      </fieldset>

      <fieldset id="ticketFieldset" style="display: none;">
        <div id="subirTicket">
          <button type="button" class="btn" id="uploadBtn">Seleccionar Imagen (Archivo)</button>
          <input type="file" class="hidden" id="ticketImage" accept="image/*">
        </div>

        <legend style="margin-top: 15px;">Captura de Imagen</legend>
        <label for="cameraSelect">Seleccionar cámara:</label>
        <select id="cameraSelect">
          <option value="">--Selecciona una cámara--</option>
        </select>

        <video id="video" autoplay playsinline></video>
        <canvas id="canvas" width="320" height="240" style="display:none;"></canvas>
        <button id="captureButton" class="btn" type="button">Capturar Foto</button>
        <div id="imagenPrototipo"></div>
      </fieldset>

      <button type="submit" class="btn">Registrar Operación</button>
    </form>
